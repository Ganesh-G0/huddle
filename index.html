<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./huddle-landing-page-with-single-introductory-section-master/images/favicon-32x32.png">
    <title>huddle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/8eb453f12c.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <header>
            <img 
            class="header-img"
            src="./huddle-landing-page-with-single-introductory-section-master/images/logo.svg"
            alt="Huddle Logo">
        </header>
        <section class="row">
            <div class="col-sm-7">
                <img 
                class="img-fluid p-3 pt-5"
                src="./huddle-landing-page-with-single-introductory-section-master/images/illustration-mockups.svg" 
                alt="Hero">
            </div>
            <div class="col-sm-4 pt-5 mt-5">
                <h1>Build The Community Your Fans Will Love</h1>
                <p>
                    Huddle re-imagines the way we build communities. You have a voice, but so does your audience. 
                    Create connections with your users as you engage in genuine discussion. 
                </p>
                <button id="btn1" type="submit" class="btn-block rounded-5 hover:text-white">Register</button>
            </div>
        </section>
        <footer class="">
            <button class="btn-block rounded-5"><i class="fa fa-facebook-f"></i></button>
            <button class="btn-block rounded-5"><i class="fa fa-twitter"></i></button>
            <button class="btn-block rounded-5"><i class="fa fa-instagram"></i></button>
        </footer>
    </main>
</body>
</html>
